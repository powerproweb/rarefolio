# ============================================================
#  Rarefolio.io — Auto-deploy to BlueHost on push to main
# ============================================================
#
#  Required GitHub repository secrets (Settings → Secrets → Actions):
#    SFTP_HOST        — rarefolio.io
#    SFTP_USER        — BlueHost SSH username (see cPanel → SSH Access)
#    SFTP_KEY         — private SSH key (see setup instructions below)
#    SFTP_REMOTE_DIR  — /home/rarefolio/public_html
#
#  SSH key setup (one-time, run locally in Git Bash or WSL):
#    ssh-keygen -t ed25519 -C "github-deploy" -f ~/.ssh/rarefolio_deploy
#    # Add ~/.ssh/rarefolio_deploy.pub to BlueHost:
#    #   cPanel → SSH Access → Manage SSH Keys → Import Key
#    # Add ~/.ssh/rarefolio_deploy (private key) as GitHub secret SFTP_KEY
#
#  Trigger manually:
#    GitHub → Actions → Deploy to BlueHost → Run workflow
# ============================================================

name: Deploy to BlueHost

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: rsync → BlueHost
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Verify required deploy files
        run: |
          required_files=(
            "license.html"
          )
          missing=0
          for file in "${required_files[@]}"; do
            if [[ ! -f "$file" ]]; then
              echo "Missing required file: $file"
              missing=1
            fi
          done
          if [[ "$missing" -ne 0 ]]; then
            echo "Deployment blocked: one or more required files are missing."
            exit 1
          fi
          if grep -R --line-number --include="*.html" --include="*.php" 'collection-inventors-guild-prelaunch' .; then
            echo "Deployment blocked: retired Inventors prelaunch route was reintroduced."
            exit 1
          fi
          python - <<'PY'
          import pathlib
          import re
          import sys

          root = pathlib.Path(".")
          targets = list(root.glob("*.html")) + [root / "_col" / "block.php"]
          required_links = (
              'href="/downloads.html"',
              'href="/privacy.html"',
              'href="/terms.html"',
              'href="/license"',
          )

          incomplete = []
          for path in targets:
              if not path.exists():
                  continue
              text = path.read_text(encoding="utf-8", errors="ignore")
              match = re.search(r'<div class="footer-right">([\s\S]*?)</div>', text)
              if not match:
                  continue
              footer_body = match.group(1)
              if any(link not in footer_body for link in required_links):
                  incomplete.append(str(path))

          if incomplete:
              print("Deployment blocked: footer legal links are incomplete in:")
              for path in incomplete:
                  print(f" - {path}")
              sys.exit(1)
          PY

      - name: Install SSH key
        run: |
          mkdir -p ~/.ssh
          # Decode base64-encoded key — avoids CRLF/echo corruption
          echo "${{ secrets.SFTP_KEY }}" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p 22 ${{ secrets.SFTP_HOST }} >> ~/.ssh/known_hosts

      - name: Install lftp
        run: sudo apt-get install -y lftp

      - name: Deploy via lftp SFTP
        run: |
          # lftp SFTP uses the SSH SFTP subsystem — works without shell access on BlueHost
          lftp -c "
            set sftp:auto-confirm yes
            set sftp:connect-program 'ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -p 22 -q'
            set net:timeout 60
            set net:max-retries 3
            open -u "${{ secrets.SFTP_USER }}," sftp://${{ secrets.SFTP_HOST }}
            mirror --reverse --verbose --only-newer \\
              --exclude-glob .git/ \\
              --exclude-glob .gitignore \\
              --exclude-glob .gitattributes \\
              --exclude-glob README.md \\
              --exclude-glob 01_md_plan_files/ \\
              --exclude-glob .github/ \\
              --exclude-glob '*.log' \\
              ./ ${{ secrets.SFTP_REMOTE_DIR }}/
            bye
          "
