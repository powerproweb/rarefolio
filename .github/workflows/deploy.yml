# ============================================================
#  Rarefolio.io — Auto-deploy to BlueHost on push to main
# ============================================================
#
#  Required GitHub repository secrets (Settings → Secrets → Actions):
#    SFTP_HOST        — e.g. rarefolio.io
#    SFTP_USER        — your cPanel username
#    SFTP_PASS        — your cPanel password
#    SFTP_REMOTE_DIR  — /home/rarefolio/public_html
#
#  Uses lftp over SFTP (SSH port 22) — mirror with exclusions.
#  Only transfers files newer than what is already on the server.
#
#  Trigger manually:
#    GitHub → Actions → Deploy to BlueHost → Run workflow
# ============================================================

name: Deploy to BlueHost

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: SFTP deploy → BlueHost
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install lftp
        run: sudo apt-get install -y lftp

      - name: Deploy via lftp SFTP
        env:
          SFTP_PASS: ${{ secrets.SFTP_PASS }}
        run: |
          lftp -c "
            set sftp:auto-confirm yes
            set net:timeout 60
            set net:max-retries 3
            set net:reconnect-interval-base 5
            open sftp://${{ secrets.SFTP_USER }}:\$SFTP_PASS@${{ secrets.SFTP_HOST }}:22
            mirror --reverse --verbose --only-newer \\
              --exclude-glob .git \\
              --exclude-glob .gitignore \\
              --exclude-glob .gitattributes \\
              --exclude-glob README.md \\
              --exclude-glob index_OLD.html \\
              --exclude-glob '01_md_plan_files/' \\
              --exclude-glob '.github/' \\
              --exclude-glob '*.log' \\
              ./ ${{ secrets.SFTP_REMOTE_DIR }}
            bye
          "
